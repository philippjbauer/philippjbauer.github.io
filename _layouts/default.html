<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    <title>{% if page.url == '/' %}{{ site.title }}{% else %}{{ page.title }} – {{ site.title }}{% endif %}</title>
    {% seo title=false %}
    {% assign meta_image = page.image | default: site.image %}
    {% if meta_image %}
      <meta property="og:image" content="{{ site.url }}{{ meta_image | relative_url }}">
      <meta property="og:image:alt" content="{{ page.image_alt | default: page.title }}">
      <meta name="twitter:card" content="summary_large_image">
      <meta name="twitter:image" content="{{ site.url }}{{ meta_image | relative_url }}">
      <meta name="twitter:image:alt" content="{{ page.image_alt | default: page.title }}">
    {% endif %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:opsz,wght@8..72,300;8..72,400;8..72,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="mobile-header">
      <span class="mobile-site-title">{{ site.title }}</span>
      <button class="hamburger" id="nav-toggle" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
        <span></span><span></span><span></span>
      </button>
    </header>
    <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
    <div class="site-wrap">
      <aside class="sidebar" id="sidebar">
        <button class="nav-close" id="nav-close" aria-label="Close navigation">&times;</button>
        {% include nav.html %}
      </aside>
      <main class="content">
      {{ content }}
      </main>
    </div>
    <script>
      (function() {
        var toggle  = document.getElementById('nav-toggle');
        var closeBtn = document.getElementById('nav-close');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('nav-overlay');
        function openNav() {
          sidebar.classList.add('is-open');
          overlay.classList.add('is-visible');
          toggle.setAttribute('aria-expanded', 'true');
          overlay.setAttribute('aria-hidden', 'false');
        }
        function closeNav() {
          sidebar.classList.remove('is-open');
          overlay.classList.remove('is-visible');
          toggle.setAttribute('aria-expanded', 'false');
          overlay.setAttribute('aria-hidden', 'true');
        }
        toggle.addEventListener('click', openNav);
        closeBtn.addEventListener('click', closeNav);
        overlay.addEventListener('click', closeNav);
      })();
    </script>
  </body>
</html>
