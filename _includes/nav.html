<nav class="nav">
  <div class="nav-inner">
    <img src="{{ '/assets/portrait.jpg' | relative_url }}" alt="{{ site.author }}" class="portrait">

      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/about/' | relative_url }}">About</a></li>
    </ul>
    <hr>
    <ul class="nav-list">
      {% for p in site.posts %}
          <li><a href="{{ p.url | relative_url }}">{{ p.title }}</a><br>{{ post.date | date: "%B %d, %Y" }}</li>
      {% endfor %}
    </ul>
    <div class="nav-footer"><p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}</p></div>
  </div>
